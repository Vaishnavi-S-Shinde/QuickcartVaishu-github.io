<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>QuickCart Pro | 1000+ Products with Order History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); transition: all 0.3s; }
        :root {
            --bg-primary: #f8fafc; --bg-card: #ffffff; --text-primary: #0f172a;
            --text-secondary: #475569; --border-light: #e2e8f0;
            --navbar-bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        body.dark {
            --bg-primary: #0f172a; --bg-card: #1e293b; --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1; --border-light: #334155;
        }
        .navbar { background: var(--navbar-bg); padding: 14px 0; }
        .navbar-brand { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #facc15, #f97316); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-link { color: #e2e8f0 !important; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .nav-link:hover { color: #f97316 !important; }
        .nav-link.active-tab { color: #f97316 !important; border-bottom: 2px solid #f97316; }
        .hero-section { background: linear-gradient(135deg, #4f46e5 0%, #ec4899 100%); color: white; padding: 80px 0; }
        .hero-title { font-size: 2.8rem; font-weight: 800; }
        
        .product-card { background: var(--bg-card); border-radius: 24px; overflow: hidden; transition: all 0.3s; border: 1px solid var(--border-light); height: 100%; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.2); }
        .product-img { height: 200px; position: relative; overflow: hidden; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-badge { position: absolute; top: 12px; right: 12px; background: #ef4444; color: white; border-radius: 20px; padding: 4px 12px; font-size: 0.7rem; font-weight: 700; z-index: 2; }
        .rating { color: #ffc107; font-size: 0.85rem; }
        .btn-add-cart { background: linear-gradient(95deg, #1e293b, #0f172a); border: none; padding: 8px; border-radius: 40px; font-weight: 600; color: white; width: 100%; transition: all 0.3s; font-size: 0.9rem; }
        .btn-add-cart:hover { background: linear-gradient(95deg, #f97316, #ef4444); }
        
        .cart-sidebar { position: fixed; top: 0; right: -450px; width: 450px; height: 100vh; background: var(--bg-card); z-index: 1050; transition: right 0.3s; display: flex; flex-direction: column; border-left: 1px solid var(--border-light); }
        .cart-sidebar.open { right: 0; }
        .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1040; display: none; backdrop-filter: blur(3px); }
        .cart-overlay.show { display: block; }
        
        .page-container { display: none; padding: 50px 0; min-height: 60vh; }
        .page-container.active-page { display: block; }
        
        /* Receipt Card Styling */
        .receipt-card { background: var(--bg-card); border-radius: 28px; border: 1px solid var(--border-light); overflow: hidden; max-width: 900px; margin: 0 auto; }
        .receipt-header { background: linear-gradient(135deg, #f97316, #ef4444); color: white; padding: 30px; text-align: center; }
        .receipt-body { padding: 30px; }
        .receipt-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .receipt-table th, .receipt-table td { padding: 12px; border-bottom: 1px solid var(--border-light); text-align: left; }
        .receipt-table th { background: var(--bg-primary); font-weight: 600; }
        
        .order-card { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border-light); margin-bottom: 20px; overflow: hidden; }
        .order-header { background: linear-gradient(135deg, #f97316, #ef4444); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .order-status-badge { background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; }
        
        .account-card { background: var(--bg-card); border-radius: 24px; border: 1px solid var(--border-light); overflow: hidden; }
        .account-header { background: linear-gradient(135deg, #f97316, #ef4444); padding: 30px; text-align: center; color: white; }
        .account-avatar { width: 80px; height: 80px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; }
        .account-avatar i { font-size: 2.5rem; color: #f97316; }
        
        .theme-toggle { background: rgba(255,255,255,0.1); border-radius: 50px; padding: 6px 12px; cursor: pointer; }
        .cart-count-badge { background: #ef4444; border-radius: 30px; padding: 2px 8px; font-size: 11px; margin-left: 5px; }
        .toast-custom { position: fixed; bottom: 25px; left: 25px; z-index: 1100; background: #10b981; color: white; padding: 12px 24px; border-radius: 60px; transform: translateX(-120%); transition: transform 0.3s; }
        .toast-custom.show-toast { transform: translateX(0); }
        .back-to-top { position: fixed; bottom: 24px; right: 24px; background: #f97316; border-radius: 50%; width: 48px; height: 48px; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 99; }
        
        @media (max-width: 768px) { .cart-sidebar { width: 100%; right: -100%; } .hero-title { font-size: 1.8rem; } }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="#" onclick="switchTab('home'); return false;"><i class="fas fa-bolt"></i> QuickCart Pro</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMain">
            <ul class="navbar-nav ms-auto align-items-center gap-3">
                <li class="nav-item"><a class="nav-link" id="homeTab" onclick="switchTab('home')"><i class="fas fa-home"></i> Home</a></li>
                <li class="nav-item"><a class="nav-link" id="ordersTab" onclick="switchTab('orders')"><i class="fas fa-history"></i> Orders</a></li>
                <li class="nav-item"><a class="nav-link" id="accountTab" onclick="switchTab('account')"><i class="fas fa-user"></i> Account</a></li>
                <li class="nav-item position-relative">
                    <a class="nav-link" id="cartIconBtn" style="cursor: pointer;">
                        <i class="fas fa-shopping-cart"></i> Cart
                        <span id="cartGlobalBadge" class="cart-count-badge">0</span>
                    </a>
                </li>
                <li class="nav-item"><div class="theme-toggle" id="darkModeToggle"><i class="fas fa-moon"></i> <span>Dark</span></div></li>
            </ul>
        </div>
    </div>
</nav>

<!-- HOME PAGE -->
<div id="homePage" class="page-container active-page">
    <div class="hero-section">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-7">
                    <h1 class="hero-title">1000+ Premium <span style="color: #ffd966;">Products</span></h1>
                    <p class="lead">Shop from 1000+ products with instant PDF receipt download!</p>
                    <button class="btn btn-light rounded-pill px-4 py-2 fw-bold" onclick="document.getElementById('productsSection').scrollIntoView({behavior:'smooth'})">Explore Now →</button>
                </div>
                <div class="col-md-5 text-center"><i class="fas fa-rocket" style="font-size: 5rem;"></i></div>
            </div>
        </div>
    </div>

    <div class="container py-4">
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <input type="text" id="searchInput" class="form-control rounded-pill" placeholder="🔍 Search 1000+ products...">
            </div>
            <div class="col-md-3">
                <select id="categoryFilter" class="form-select rounded-pill">
                    <option value="all">All Categories (1000+)</option>
                    <option value="Electronics">📱 Electronics</option>
                    <option value="Clothing">👕 Clothing</option>
                    <option value="Furniture">🪑 Furniture</option>
                    <option value="Home & Living">🏠 Home & Living</option>
                    <option value="Accessories">⌚ Accessories</option>
                    <option value="Sports">⚽ Sports</option>
                    <option value="Books">📚 Books</option>
                    <option value="Toys">🎮 Toys</option>
                    <option value="Beauty">💄 Beauty</option>
                    <option value="Automotive">🚗 Automotive</option>
                </select>
            </div>
            <div class="col-md-5 text-end">
                <div class="bg-warning text-dark d-inline-block rounded-pill px-3 py-2 fw-bold">⚡ 1000+ Products Available!</div>
            </div>
        </div>
        <div class="row g-4" id="productGrid"></div>
        <div class="text-center mt-4" id="loadMoreBtn">
            <button class="btn btn-outline-warning rounded-pill px-4" onclick="loadMoreProducts()">Load More Products →</button>
        </div>
    </div>
</div>

<!-- ORDERS PAGE (Order History) -->
<div id="ordersPage" class="page-container">
    <div class="container">
        <h2 class="text-center mb-4 fw-bold" style="background: linear-gradient(135deg, #f97316, #dc2626); -webkit-background-clip: text; background-clip: text; color: transparent;">📜 Order History</h2>
        <div id="ordersList" class="row justify-content-center"></div>
    </div>
</div>

<!-- ACCOUNT PAGE -->
<div id="accountPage" class="page-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="account-card">
                    <div class="account-header">
                        <div class="account-avatar"><i class="fas fa-user-circle"></i></div>
                        <h3 id="userDisplayName">Guest User</h3>
                        <p id="userDisplayEmail" class="opacity-75 mb-0">Not logged in</p>
                    </div>
                    <div class="p-4">
                        <div class="text-center mb-4">
                            <button class="btn btn-warning rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#loginModal"><i class="fas fa-sign-in-alt"></i> Login / Sign Up</button>
                            <button class="btn btn-outline-secondary rounded-pill px-4 mt-2" id="logoutBtn" style="display: none;" onclick="logoutUser()">Logout</button>
                        </div>
                        <div class="border-top pt-4">
                            <h5 class="mb-3"><i class="fas fa-heart text-danger"></i> My Wishlist (<span id="wishlistCount">0</span>)</h5>
                            <div id="wishlistItems" class="mt-2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- CHECKOUT PAGE -->
<div id="checkoutPage" class="page-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4" style="background: var(--bg-card); border-radius: 28px;">
                    <h3 class="mb-4">Secure Checkout</h3>
                    <form id="checkoutForm">
                        <input type="text" id="fullName" class="form-control mb-3" placeholder="Full Name" required>
                        <input type="email" id="emailAddress" class="form-control mb-3" placeholder="Email" required>
                        <textarea id="shippingAddress" class="form-control mb-3" rows="2" placeholder="Shipping Address" required></textarea>
                        <select id="paymentMethod" class="form-select mb-3">
                            <option>Credit Card</option><option>UPI</option><option>Cash on Delivery</option>
                        </select>
                        <div class="mb-3">
                            <input type="text" id="couponCode" class="form-control" placeholder="Coupon Code (SAVE10, WELCOME15)">
                            <small id="couponMsg" class="text-success"></small>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 rounded-pill py-2 fw-bold">Place Order → View Receipt</button>
                        <button type="button" class="btn btn-outline-secondary w-100 rounded-pill py-2 mt-2" onclick="switchTab('home')">← Back to Shop</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- RECEIPT PAGE -->
<div id="receiptPage" class="page-container">
    <div class="container">
        <div id="receiptDisplay" class="receipt-card">
            <!-- Receipt content will be loaded here -->
        </div>
    </div>
</div>

<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content" style="background: var(--bg-card);">
            <div class="modal-header"><h5 class="modal-title">Login / Sign Up</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <input type="text" id="loginName" class="form-control mb-2" placeholder="Name">
                <input type="email" id="loginEmail" class="form-control mb-2" placeholder="Email">
                <button class="btn btn-warning w-100" onclick="loginUser()">Continue</button>
            </div>
        </div>
    </div>
</div>

<!-- Cart Sidebar -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
    <div class="p-3 border-bottom d-flex justify-content-between"><h4><i class="fas fa-bag-shopping"></i> Your Cart</h4><button id="closeCartBtn" class="btn-close"></button></div>
    <div class="flex-grow-1 overflow-auto p-3" id="cartItemsList"></div>
    <div class="p-3 border-top"><div class="d-flex justify-content-between fw-bold fs-5"><span>Total:</span><span id="cartTotalAmount">₹0</span></div>
    <button id="checkoutBtn" class="btn btn-warning w-100 rounded-pill mt-2">Proceed to Checkout</button></div>
</div>

<div id="toastMsg" class="toast-custom"></div>
<div class="back-to-top" id="backToTopBtn"><i class="fas fa-arrow-up text-white"></i></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ============ GENERATE 1000+ PRODUCTS ============
const categories = ['Electronics', 'Clothing', 'Furniture', 'Home & Living', 'Accessories', 'Sports', 'Books', 'Toys', 'Beauty', 'Automotive'];
const badges = ['Bestseller', 'New', 'Trending', 'Premium', 'Popular', 'Limited', 'Eco', 'Hot Deal', 'Staff Pick', 'Sale'];
const icons = ['laptop', 'tshirt', 'couch', 'home', 'watch', 'futbol', 'book', 'gamepad', 'spa', 'car'];

let allProducts = [];
let displayedProducts = 0;
const PRODUCTS_PER_PAGE = 24;

// Generate 1000 products
for(let i = 1; i <= 1000; i++) {
    const category = categories[i % categories.length];
    let price;
    if(category === 'Electronics') price = Math.floor(Math.random() * 80000) + 2000;
    else if(category === 'Furniture') price = Math.floor(Math.random() * 60000) + 3000;
    else if(category === 'Clothing') price = Math.floor(Math.random() * 8000) + 500;
    else if(category === 'Accessories') price = Math.floor(Math.random() * 15000) + 500;
    else if(category === 'Sports') price = Math.floor(Math.random() * 12000) + 500;
    else if(category === 'Books') price = Math.floor(Math.random() * 3000) + 200;
    else price = Math.floor(Math.random() * 20000) + 500;
    
    allProducts.push({
        id: i,
        name: `${category} Product ${i} - ${['Premium', 'Deluxe', 'Pro', 'Ultra', 'Smart'][i % 5]} ${String.fromCharCode(65 + (i % 26))}`,
        category: category,
        price: price,
        desc: `High quality ${category.toLowerCase()} product with premium features and warranty.`,
        image: `https://picsum.photos/id/${(i % 100) + 1}/300/200`,
        badge: badges[i % badges.length],
        rating: (3 + Math.random() * 2).toFixed(1),
        stock: Math.floor(Math.random() * 100) + 10
    });
}

// ============ STATE ============
let cart = [];
let orders = [];
let wishlist = [];
let currentUser = null;
let appliedCoupon = null;
const coupons = { "SAVE10": 10, "WELCOME15": 15 };

// ============ TAB SWITCHING ============
function switchTab(tabName) {
    document.querySelectorAll('.page-container').forEach(page => page.classList.remove('active-page'));
    document.getElementById(tabName + 'Page').classList.add('active-page');
    
    document.querySelectorAll('.nav-link').forEach(tab => tab.classList.remove('active-tab'));
    document.getElementById(tabName + 'Tab').classList.add('active-tab');
    
    if (tabName === 'orders') renderOrders();
    if (tabName === 'home') renderProducts();
    if (tabName === 'account') updateWishlistUI();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============ LOAD DATA ============
function loadData() {
    let savedCart = localStorage.getItem('quickcart_cart');
    if(savedCart) cart = JSON.parse(savedCart);
    let savedOrders = localStorage.getItem('quickcart_orders');
    if(savedOrders) orders = JSON.parse(savedOrders);
    let savedWishlist = localStorage.getItem('quickcart_wishlist');
    if(savedWishlist) wishlist = JSON.parse(savedWishlist);
    let savedUser = localStorage.getItem('quickcart_user');
    if(savedUser) currentUser = JSON.parse(savedUser);
    updateAll();
}

function saveAll() {
    localStorage.setItem('quickcart_cart', JSON.stringify(cart));
    localStorage.setItem('quickcart_orders', JSON.stringify(orders));
    localStorage.setItem('quickcart_wishlist', JSON.stringify(wishlist));
    if(currentUser) localStorage.setItem('quickcart_user', JSON.stringify(currentUser));
    updateAll();
}

function updateAll() {
    const totalItems = cart.reduce((s,i)=> s + i.quantity, 0);
    document.getElementById('cartGlobalBadge').innerText = totalItems;
    updateCartUI();
    updateUserUI();
    updateWishlistUI();
}

// ============ RENDER PRODUCTS (PAGINATED) ============
function renderProducts() {
    const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
    const category = document.getElementById('categoryFilter')?.value || 'all';
    
    let filtered = allProducts.filter(p => (category === 'all' || p.category === category) && 
        (p.name.toLowerCase().includes(searchTerm) || p.desc.toLowerCase().includes(searchTerm)));
    
    const grid = document.getElementById('productGrid');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    
    if(filtered.length <= PRODUCTS_PER_PAGE) {
        loadMoreBtn.style.display = 'none';
    } else {
        loadMoreBtn.style.display = 'block';
    }
    
    const productsToShow = filtered.slice(0, PRODUCTS_PER_PAGE);
    window.currentFiltered = filtered;
    window.currentDisplayCount = PRODUCTS_PER_PAGE;
    
    grid.innerHTML = productsToShow.map(prod => `
        <div class="col-lg-3 col-md-4 col-sm-6">
            <div class="product-card">
                <div class="product-img">
                    <img src="${prod.image}" alt="${prod.name}" onerror="this.src='https://picsum.photos/300/200?random=${prod.id}'">
                    <div class="product-badge">${prod.badge}</div>
                </div>
                <div class="p-2">
                    <div class="rating">${'★'.repeat(Math.floor(prod.rating))}${'☆'.repeat(5-Math.floor(prod.rating))} (${prod.rating})</div>
                    <h6 class="fw-bold mt-1" style="font-size:0.85rem;">${prod.name.substring(0, 35)}</h6>
                    <div class="d-flex justify-content-between mt-1">
                        <span class="fw-bold fs-6" style="color:#f97316;">₹${prod.price.toLocaleString()}</span>
                        <span class="text-decoration-line-through text-secondary small">₹${Math.round(prod.price*1.4).toLocaleString()}</span>
                    </div>
                    <button class="btn-add-cart mt-2" onclick="addToCart(${prod.id}, '${prod.name.replace(/'/g, "\\'")}', ${prod.price})"><i class="fas fa-cart-plus"></i> Add to Cart</button>
                </div>
            </div>
        </div>
    `).join('');
}

function loadMoreProducts() {
    if(window.currentFiltered && window.currentDisplayCount < window.currentFiltered.length) {
        const newCount = Math.min(window.currentDisplayCount + PRODUCTS_PER_PAGE, window.currentFiltered.length);
        const moreProducts = window.currentFiltered.slice(window.currentDisplayCount, newCount);
        const grid = document.getElementById('productGrid');
        
        moreProducts.forEach(prod => {
            const productHtml = `
                <div class="col-lg-3 col-md-4 col-sm-6">
                    <div class="product-card">
                        <div class="product-img">
                            <img src="${prod.image}" alt="${prod.name}" onerror="this.src='https://picsum.photos/300/200?random=${prod.id}'">
                            <div class="product-badge">${prod.badge}</div>
                        </div>
                        <div class="p-2">
                            <div class="rating">${'★'.repeat(Math.floor(prod.rating))}${'☆'.repeat(5-Math.floor(prod.rating))} (${prod.rating})</div>
                            <h6 class="fw-bold mt-1" style="font-size:0.85rem;">${prod.name.substring(0, 35)}</h6>
                            <div class="d-flex justify-content-between mt-1">
                                <span class="fw-bold fs-6" style="color:#f97316;">₹${prod.price.toLocaleString()}</span>
                                <span class="text-decoration-line-through text-secondary small">₹${Math.round(prod.price*1.4).toLocaleString()}</span>
                            </div>
                            <button class="btn-add-cart mt-2" onclick="addToCart(${prod.id}, '${prod.name.replace(/'/g, "\\'")}', ${prod.price})"><i class="fas fa-cart-plus"></i> Add to Cart</button>
                        </div>
                    </div>
                </div>
            `;
            grid.insertAdjacentHTML('beforeend', productHtml);
        });
        
        window.currentDisplayCount = newCount;
        
        if(window.currentDisplayCount >= window.currentFiltered.length) {
            document.getElementById('loadMoreBtn').style.display = 'none';
        }
    }
}

function addToCart(id, name, price) {
    let existing = cart.find(i=> i.id === id);
    if(existing) existing.quantity++;
    else cart.push({id, name, price, quantity: 1});
    saveAll();
    showToast(`${name.substring(0, 30)} added to cart!`, false);
}

function updateCartUI() {
    const container = document.getElementById('cartItemsList');
    if(cart.length === 0) { 
        container.innerHTML = '<div class="text-center text-muted mt-5">Cart is empty ✨</div>'; 
        document.getElementById('cartTotalAmount').innerText = '₹0'; 
        return; 
    }
    let total = 0;
    let html = '';
    cart.forEach(item => { 
        total += item.price * item.quantity;
        html += `<div class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom">
                    <div style="flex:2"><strong>${item.name.substring(0, 20)}</strong><br><small>₹${item.price.toLocaleString()}</small></div>
                    <div class="d-flex align-items-center gap-1">
                        <button class="btn btn-sm btn-outline-secondary" onclick="updateQty(${item.id}, -1)">-</button>
                        <span class="fw-bold mx-1">${item.quantity}</span>
                        <button class="btn btn-sm btn-outline-secondary" onclick="updateQty(${item.id}, 1)">+</button>
                        <button class="btn btn-sm btn-danger ms-1" onclick="removeCartItem(${item.id})"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="fw-bold ms-2">₹${(item.price * item.quantity).toLocaleString()}</div>
                </div>`;
    });
    container.innerHTML = html;
    document.getElementById('cartTotalAmount').innerText = `₹${total.toLocaleString()}`;
}

function updateQty(id, delta) { 
    let idx = cart.findIndex(i=> i.id===id); 
    if(idx!==-1) { 
        cart[idx].quantity += delta; 
        if(cart[idx].quantity<=0) cart.splice(idx,1); 
        saveAll(); 
    } 
}

function removeCartItem(id) { 
    cart = cart.filter(i=> i.id !== id); 
    saveAll(); 
    showToast("Item removed", false); 
}

// ============ CHECKOUT & ORDER ============
document.getElementById('checkoutForm')?.addEventListener('submit', function(e) { 
    e.preventDefault(); 
    createOrderAndShowReceipt(); 
});

function createOrderAndShowReceipt() {
    if(cart.length===0) { showToast("Cart is empty!", true); return; }
    
    let total = cart.reduce((s,i)=> s + i.price*i.quantity, 0);
    let discountAmount = 0;
    let couponCode = document.getElementById('couponCode')?.value.toUpperCase();
    if(coupons[couponCode]) discountAmount = total * coupons[couponCode] / 100;
    
    let finalTotal = total - discountAmount;
    const orderId = 'ORD' + Date.now() + Math.floor(Math.random() * 1000);
    
    const newOrder = { 
        id: orderId, 
        date: new Date().toLocaleString(), 
        items: [...cart], 
        subtotal: total, 
        discount: discountAmount, 
        total: finalTotal, 
        status: 'Confirmed',
        customer: { 
            name: document.getElementById('fullName').value, 
            email: document.getElementById('emailAddress').value, 
            address: document.getElementById('shippingAddress').value, 
            payment: document.getElementById('paymentMethod').value 
        }
    };
    
    orders.unshift(newOrder);
    saveAll();
    
    // Clear cart
    cart = [];
    saveAll();
    
    // Show receipt
    showReceiptPage(newOrder);
    
    showToast(`✅ Order placed successfully! Order ID: ${orderId}`, false);
}

function continueShopping() {
    switchTab('home');
    showToast("Continue shopping!", false);
}

function viewOrderHistory() {
    switchTab('orders');
}

// ============ DOWNLOAD PDF RECEIPT (FIXED) ============
function downloadReceiptPDF() {
    const order = window.currentOrder;
    if(!order) {
        showToast("No order found to download!", true);
        return;
    }
    
    const pdfHTML = `
        <div style="padding: 40px; font-family: 'Inter', Arial, sans-serif; max-width: 800px; margin: 0 auto; background: white;">
            <div style="text-align: center; border-bottom: 3px solid #f97316; padding-bottom: 20px; margin-bottom: 25px;">
                <h1 style="color: #f97316; margin: 0;">QuickCart Pro</h1>
                <h2 style="color: #333;">Payment Receipt</h2>
            </div>
            
            <div style="display: flex; justify-content: space-between; margin-bottom: 25px; padding: 15px; background: #f8fafc; border-radius: 12px;">
                <div><strong>Order ID:</strong> ${order.id}</div>
                <div><strong>Date:</strong> ${order.date}</div>
                <div><strong>Status:</strong> <span style="color: #10b981;">✓ Paid</span></div>
            </div>
            
            <div style="background: #fef3c7; padding: 20px; border-radius: 12px; margin-bottom: 25px;">
                <h3 style="margin-top: 0;">Customer Information</h3>
                <p><strong>Name:</strong> ${order.customer.name}<br>
                <strong>Email:</strong> ${order.customer.email}<br>
                <strong>Address:</strong> ${order.customer.address}<br>
                <strong>Payment Method:</strong> ${order.customer.payment}</p>
            </div>
            
            <h3>Order Items</h3>
            <table style="width: 100%; border-collapse: collapse; margin-bottom: 25px;">
                <thead>
                    <tr style="background: #f97316; color: white;">
                        <th style="padding: 10px; text-align: left;">Product</th>
                        <th style="padding: 10px; text-align: center;">Qty</th>
                        <th style="padding: 10px; text-align: right;">Price</th>
                        <th style="padding: 10px; text-align: right;">Total</th>
                    </tr>
                </thead>
                <tbody>
                    ${order.items.map(i => `
                        <tr style="border-bottom: 1px solid #ddd;">
                            <td style="padding: 8px;">${i.name}</td>
                            <td style="padding: 8px; text-align: center;">${i.quantity}</td>
                            <td style="padding: 8px; text-align: right;">₹${i.price.toLocaleString()}</td>
                            <td style="padding: 8px; text-align: right;">₹${(i.price * i.quantity).toLocaleString()}</td>
                        </tr>
                    `).join('')}
                </tbody>
                <tfoot>
                    <tr><td colspan="3" style="padding: 8px; text-align: right;"><strong>Subtotal:</strong></td><td style="padding: 8px; text-align: right;">₹${order.subtotal.toLocaleString()}</td></tr>
                    ${order.discount > 0 ? `<tr><td colspan="3" style="padding: 8px; text-align: right;"><strong>Discount:</strong></td><td style="padding: 8px; text-align: right; color: #10b981;">-₹${order.discount.toLocaleString()}</td></tr>` : ''}
                    <tr style="border-top: 2px solid #f97316;"><td colspan="3" style="padding: 8px; text-align: right;"><strong>Grand Total:</strong></td><td style="padding: 8px; text-align: right;"><strong style="color:#f97316;">₹${order.total.toLocaleString()}</strong></td></tr>
                </tfoot>
            </table>
            
            <div style="text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid #ddd; color: #999;">
                <p>Thank you for shopping with QuickCart Pro!</p>
                <p>For any queries, contact: support@quickcart.com</p>
            </div>
        </div>
    `;
    
    const element = document.createElement('div');
    element.innerHTML = pdfHTML;
    element.style.position = 'absolute';
    element.style.left = '-9999px';
    element.style.top = '-9999px';
    document.body.appendChild(element);
    
    html2pdf().from(element).set({
        margin: [0.5, 0.5, 0.5, 0.5],
        filename: `Payment_Receipt_${order.id}.pdf`,
        html2canvas: { scale: 2, letterRendering: true },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
    }).save().then(() => {
        document.body.removeChild(element);
        showToast("✅ Receipt Downloaded Successfully!", false);
    }).catch(err => {
        document.body.removeChild(element);
        showToast("Error downloading receipt!", true);
        console.error(err);
    });
}

// ============ RENDER ORDER HISTORY ============
function renderOrders() {
    const container = document.getElementById('ordersList');
    if(orders.length === 0) { 
        container.innerHTML = '<div class="col-md-8 text-center text-muted py-5"><i class="fas fa-history fa-4x mb-3 opacity-50"></i><h4>No Order History</h4><p>Complete a purchase to see your order history here!</p><button class="btn btn-warning rounded-pill px-4" onclick="switchTab(\'home\')">Start Shopping</button></div>'; 
        return; 
    }
    
    container.innerHTML = '<div class="col-md-9">' + orders.map(order => `
        <div class="order-card">
            <div class="order-header">
                <div>
                    <strong><i class="fas fa-receipt"></i> Order #${order.id}</strong><br>
                    <small>${order.date}</small>
                </div>
                <div><span class="order-status-badge">${order.status}</span></div>
            </div>
            <div class="p-3">
                <div class="row mb-2">
                    <div class="col-md-6"><strong>Customer:</strong> ${order.customer.name}</div>
                    <div class="col-md-6"><strong>Total:</strong> <span style="color:#f97316; font-weight:bold;">₹${order.total.toLocaleString()}</span></div>
                </div>
                <div class="mb-2"><strong>Items (${order.items.length}):</strong></div>
                <div class="small text-secondary mb-2">
                    ${order.items.slice(0, 3).map(i => `${i.name} x${i.quantity}`).join(', ')}${order.items.length > 3 ? '...' : ''}
                </div>
                <div class="text-center mt-2">
                    <button class="btn btn-success btn-sm rounded-pill px-3" onclick="viewReceiptFromHistory('${order.id}')">
                        <i class="fas fa-download"></i> Download Receipt
                    </button>
                </div>
            </div>
        </div>
    `).join('') + '</div>';
}

function viewReceiptFromHistory(orderId) {
    const order = orders.find(o => o.id === orderId);
    if(order) {
        showReceiptPage(order);
    }
}

// ============ USER FUNCTIONS ============
function loginUser() {
    let name = document.getElementById('loginName').value;
    let email = document.getElementById('loginEmail').value;
    if(name && email) { 
        currentUser = { name, email }; 
        saveAll(); 
        updateUserUI(); 
        bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide(); 
        showToast(`Welcome ${name}!`, false); 
    } else {
        showToast("Please enter name and email", true);
    }
}

function logoutUser() { 
    currentUser = null; 
    localStorage.removeItem('quickcart_user'); 
    updateUserUI(); 
    showToast("Logged out", false); 
}

function updateUserUI() {
    if(currentUser) { 
        document.getElementById('userDisplayName').innerText = currentUser.name; 
        document.getElementById('userDisplayEmail').innerText = currentUser.email; 
        document.getElementById('logoutBtn').style.display = 'inline-block'; 
    } else { 
        document.getElementById('userDisplayName').innerText = 'Guest User'; 
        document.getElementById('userDisplayEmail').innerText = 'Not logged in'; 
        document.getElementById('logoutBtn').style.display = 'none'; 
    }
}

function toggleWishlist(id) {
    if(wishlist.includes(id)) wishlist = wishlist.filter(i=> i !== id);
    else wishlist.push(id);
    saveAll();
    updateWishlistUI();
    showToast(wishlist.includes(id) ? "Added to wishlist ❤️" : "Removed", false);
}

function updateWishlistUI() { 
    document.getElementById('wishlistCount').innerText = wishlist.length; 
    let items = wishlist.slice(0, 10).map(id => allProducts.find(p=> p.id===id)).filter(p=>p).map(p=> `
        <div class="d-flex justify-content-between align-items-center mb-2 p-2 rounded-3" style="background: var(--bg-primary);">
            <span style="font-size:0.85rem;">${p.name.substring(0, 25)} - ₹${p.price.toLocaleString()}</span>
            <button class="btn btn-sm btn-danger rounded-pill" onclick="toggleWishlist(${p.id})">Remove</button>
        </div>
    `).join(''); 
    document.getElementById('wishlistItems').innerHTML = items || '<div class="text-center text-muted py-3">No items in wishlist</div>'; 
}

function showToast(msg, isErr) { 
    let t = document.getElementById('toastMsg'); 
    t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'} me-2"></i> ${msg}`; 
    t.style.background = isErr ? '#ef4444' : '#10b981'; 
    t.classList.add('show-toast'); 
    setTimeout(()=> t.classList.remove('show-toast'), 3000); 
}

// ============ EVENT LISTENERS ============
document.getElementById('searchInput')?.addEventListener('keyup', ()=> renderProducts());
document.getElementById('categoryFilter')?.addEventListener('change', ()=> renderProducts());
document.getElementById('cartIconBtn')?.addEventListener('click', ()=> document.getElementById('cartSidebar').classList.add('open'));
document.getElementById('closeCartBtn')?.addEventListener('click', ()=> document.getElementById('cartSidebar').classList.remove('open'));
document.getElementById('cartOverlay')?.addEventListener('click', ()=> document.getElementById('cartSidebar').classList.remove('open'));
document.getElementById('checkoutBtn')?.addEventListener('click', ()=> { 
    document.getElementById('cartSidebar').classList.remove('open'); 
    switchTab('checkout'); 
});

// Dark Mode
document.getElementById('darkModeToggle')?.addEventListener('click', ()=> { 
    document.body.classList.toggle('dark'); 
    localStorage.setItem('darkMode', document.body.classList.contains('dark')); 
    document.getElementById('darkModeToggle').innerHTML = document.body.classList.contains('dark') ? '<i class="fas fa-sun"></i> Light' : '<i class="fas fa-moon"></i> Dark';
});
if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');

// Back to top
window.addEventListener('scroll', ()=> { document.getElementById('backToTopBtn').style.display = window.scrollY > 400 ? 'flex' : 'none'; });
document.getElementById('backToTopBtn')?.addEventListener('click', ()=> window.scrollTo({top:0, behavior:'smooth'}));

// Initialize
loadData();
renderProducts();

// Make functions global
window.switchTab = switchTab;
window.addToCart = addToCart;
window.toggleWishlist = toggleWishlist;
window.updateQty = updateQty;
window.removeCartItem = removeCartItem;
window.loginUser = loginUser;
window.logoutUser = logoutUser;
window.downloadReceiptPDF = downloadReceiptPDF;
window.continueShopping = continueShopping;
window.viewOrderHistory = viewOrderHistory;
window.viewReceiptFromHistory = viewReceiptFromHistory;
window.loadMoreProducts = loadMoreProducts;
</script>
